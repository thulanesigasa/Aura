<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 – Page Not Found | Aura</title>

    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100;200;300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        mil: {
                            accent: '#FF9800',
                            dark: '#000000',
                            softDark: 'rgba(0,0,0,0.5)',
                            light: '#FFFFFF',
                            softBg: '#F2F2F2',
                            border: 'rgba(0,0,0,0.1)'
                        }
                    }
                }
            }
        }
    </script>
</head>

<body
    class="bg-[#1a1a1a] text-mil-light font-sans min-h-screen flex items-center justify-center relative overflow-hidden">
    <!-- Abstract background shape -->
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 opacity-5 pointer-events-none">
        <p class="text-[300px] font-bold leading-none">404</p>
    </div>

    <div class="text-center px-6 relative z-10">
        <p class="text-[120px] font-bold text-mil-light leading-none mb-4">404<span class="text-mil-accent">.</span></p>
        <h1 class="text-3xl font-bold mb-4 text-mil-light">Page Not Found</h1>
        <p class="text-[rgba(255,255,255,0.6)] text-lg mb-10 max-w-md mx-auto">The page you're looking for doesn't exist
            or has
            been moved.</p>

        <a href="/"
            class="inline-flex items-center justify-between h-[60px] pl-8 pr-2 bg-mil-accent text-mil-dark text-[11px] uppercase tracking-[2px] font-semibold rounded-full hover:brightness-105 transition-all group mx-auto max-w-[220px]">
            <span class="mr-6">Back to Home</span>
            <div
                class="w-10 h-10 rounded-full bg-mil-dark flex items-center justify-center opacity-90 group-hover:scale-110 transition-transform">
                <svg class="w-4 h-4 text-mil-accent" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                </svg>
            </div>
        </a>
    </div>
</body>

</html>
