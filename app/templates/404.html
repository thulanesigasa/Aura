<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 – Page Not Found | Aura</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { aura: { 900: '#0c0a1d', 700: '#1b1738', 400: '#5b4f9e', 300: '#8070d4', 200: '#b4a7f0' }, glow: { purple: '#a78bfa', pink: '#f472b6' } }, fontFamily: { sans: ['Inter', 'sans-serif'], display: ['Outfit', 'sans-serif'] } } }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Outfit:wght@700&display=swap"
        rel="stylesheet">
    <style>
        .gradient-text {
            background: linear-gradient(135deg, #a78bfa, #f472b6, #22d3ee);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
    </style>
</head>

<body class="bg-aura-900 text-white font-sans min-h-screen flex items-center justify-center">
    <div class="text-center px-6">
        <p class="text-8xl font-display font-bold gradient-text mb-4">404</p>
        <h1 class="text-2xl font-display font-bold mb-2">Page Not Found</h1>
        <p class="text-aura-300 mb-8">The page you're looking for doesn't exist or has been moved.</p>
        <a href="/"
            class="inline-flex items-center gap-2 px-6 py-3 rounded-xl bg-gradient-to-r from-glow-purple to-glow-pink text-sm font-semibold hover:opacity-90 transition-opacity shadow-lg shadow-purple-500/20">
            <svg class="w-4 h-4 rotate-180" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
            </svg>
            Back to Home
        </a>
    </div>
</body>

</html>
