{% extends "base.html" %}

{% block title %}Sign Up | Aura Shop Admin{% endblock %}

{% block content %}
<section class="bg-[#1a1a1a] pt-24 pb-20 border-b border-[rgba(255,255,255,0.1)] relative z-10">
    <div class="max-w-md mx-auto px-4 text-center animate-slide-up">
        <h1 class="text-4xl font-bold text-mil-light tracking-tight mb-4">Admin <span
                class="text-mil-accent font-light">Signup</span></h1>
        <p class="text-lg text-[rgba(255,255,255,0.6)]">Register your account to manage your Spaza shop.</p>
    </div>
</section>

<section class="bg-mil-softBg py-20 relative z-10 min-h-[700px]">
    <div class="max-w-md mx-auto px-4">

        <div class="bg-white border border-mil-border p-8 shadow-sm animate-slide-up" style="animation-delay:.1s">
            {% if error %}
            <div class="bg-red-50 border-l-4 border-red-500 p-4 mb-6">
                <p class="text-red-700 text-sm">{{ error }}</p>
            </div>
            {% endif %}

            <form action="{{ url_for('main.admin_signup') }}" method="POST" class="space-y-6">
                <!-- Personal Info Grid -->
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                    <div>
                        <label for="first_name"
                            class="block text-[11px] uppercase tracking-[2px] font-bold text-mil-dark mb-2">First
                            Name</label>
                        <input type="text" name="first_name" id="first_name" placeholder="John" required
                            class="w-full bg-mil-softBg border-b border-mil-border py-3 px-4 text-mil-dark focus:outline-none focus:border-mil-accent transition-all placeholder:text-[rgba(0,0,0,0.3)]">
                    </div>
                    <div>
                        <label for="last_name"
                            class="block text-[11px] uppercase tracking-[2px] font-bold text-mil-dark mb-2">Surname</label>
                        <input type="text" name="last_name" id="last_name" placeholder="Doe" required
                            class="w-full bg-mil-softBg border-b border-mil-border py-3 px-4 text-mil-dark focus:outline-none focus:border-mil-accent transition-all placeholder:text-[rgba(0,0,0,0.3)]">
                    </div>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                    <div>
                        <label for="phone"
                            class="block text-[11px] uppercase tracking-[2px] font-bold text-mil-dark mb-2">Phone
                            Number</label>
                        <input type="tel" name="phone" id="phone" placeholder="071 234 5678" required
                            class="w-full bg-mil-softBg border-b border-mil-border py-3 px-4 text-mil-dark focus:outline-none focus:border-mil-accent transition-all placeholder:text-[rgba(0,0,0,0.3)]">
                    </div>
                    <div>
                        <label for="email"
                            class="block text-[11px] uppercase tracking-[2px] font-bold text-mil-dark mb-2">Email
                            Address</label>
                        <input type="email" name="email" id="email" placeholder="john@example.com" required
                            class="w-full bg-mil-softBg border-b border-mil-border py-3 px-4 text-mil-dark focus:outline-none focus:border-mil-accent transition-all placeholder:text-[rgba(0,0,0,0.3)]">
                    </div>
                </div>

                <!-- Shop Info -->
                <div>
                    <label for="shop_name"
                        class="block text-[11px] uppercase tracking-[2px] font-bold text-mil-dark mb-2">Shop
                        Name</label>
                    <input type="text" name="shop_name" id="shop_name" placeholder="e.g. Sipho's Spaza" required
                        class="w-full bg-mil-softBg border-b border-mil-border py-3 px-4 text-mil-dark focus:outline-none focus:border-mil-accent transition-all placeholder:text-[rgba(0,0,0,0.3)]">
                </div>

                <!-- Location Info -->
                <div>
                    <label for="address"
                        class="block text-[11px] uppercase tracking-[2px] font-bold text-mil-dark mb-2">Physical
                        Address</label>
                    <input type="text" name="address" id="address" placeholder="123 Main Street" required
                        class="w-full bg-mil-softBg border-b border-mil-border py-3 px-4 text-mil-dark focus:outline-none focus:border-mil-accent transition-all placeholder:text-[rgba(0,0,0,0.3)]">
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                    <div>
                        <label for="city"
                            class="block text-[11px] uppercase tracking-[2px] font-bold text-mil-dark mb-2">City</label>
                        <input type="text" name="city" id="city" value="Standerton" required
                            class="w-full bg-mil-softBg border-b border-mil-border py-3 px-4 text-mil-dark focus:outline-none focus:border-mil-accent transition-all placeholder:text-[rgba(0,0,0,0.3)]">
                    </div>
                    <div>
                        <label for="province"
                            class="block text-[11px] uppercase tracking-[2px] font-bold text-mil-dark mb-2">Province</label>
                        <input type="text" name="province" id="province" value="Mpumalanga" required
                            class="w-full bg-mil-softBg border-b border-mil-border py-3 px-4 text-mil-dark focus:outline-none focus:border-mil-accent transition-all placeholder:text-[rgba(0,0,0,0.3)]">
                    </div>
                </div>

                <div>
                    <label for="password"
                        class="block text-[11px] uppercase tracking-[2px] font-bold text-mil-dark mb-2">Password</label>
                    <input type="password" name="password" id="password" required
                        class="w-full bg-mil-softBg border-b border-mil-border py-3 px-4 text-mil-dark focus:outline-none focus:border-mil-accent transition-all placeholder:text-[rgba(0,0,0,0.3)]">
                </div>

                <div class="pt-4">
                    <button type="submit"
                        class="mil-button inline-flex items-center justify-between h-[55px] pl-6 pr-2 bg-mil-dark text-mil-light text-[12px] uppercase tracking-[2px] font-bold rounded-full hover:brightness-110 transition-all group w-full">
                        <span>Create Account</span>
                        <div
                            class="w-10 h-10 rounded-full bg-mil-accent flex items-center justify-center opacity-90 group-hover:scale-110 transition-transform">
                            <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M12 4v16m8-8H4" />
                            </svg>
                        </div>
                    </button>
                </div>
            </form>

            <div class="mt-10 pt-6 border-t border-mil-border text-center">
                <p class="text-sm text-mil-softDark">Already have an account?</p>
                <a href="{{ url_for('main.admin_login') }}"
                    class="inline-block mt-2 text-[11px] uppercase tracking-[2px] font-bold text-mil-accent hover:text-mil-dark transition-colors">Login
                    Here</a>
            </div>
        </div>

    </div>
</section>
{% endblock %}
