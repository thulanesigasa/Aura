version: "3.9"

services:
  nginx:
    build:
      context: ./nginx
    container_name: aura-proxy
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - web
    restart: unless-stopped

  web:
    build: .
    container_name: aura-web
    expose:
      - "8000"
    environment:
      - SECRET_KEY=${SECRET_KEY:-aura-production-secret-change-me}
      - DATABASE_URL=postgresql://aura_user:aura_pass@db:5432/aura_db
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: aura-db
    environment:
      POSTGRES_USER: aura_user
      POSTGRES_PASSWORD: aura_pass
      POSTGRES_DB: aura_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aura_user -d aura_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
